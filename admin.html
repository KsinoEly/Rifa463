<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:Arial">

<script>
let u=prompt("Usuario");
let p=prompt("Contraseña");
if(u!=="K-sinoEly1"||p!=="Pomelo1991$"){
alert("Acceso denegado"); location="index.html";
}
</script>

<h2>ADMIN</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="numero" placeholder="Numero 00-99"><br>

<button onclick="vender()" style="background:green">➕ Vender</button>
<button onclick="borrar()" style="background:red">➖ Liberar</button>

<br><br>

<button onclick="verLista()">📋 Ver lista</button>

<div id="lista"></div>

<h3>Fondo</h3>
<input type="file" onchange="subirFondo(event)">

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB2bsxvhoYZWGmDSIYQoQ7v7cC8QXYRFTc",
authDomain:"rifa-d7efe.firebaseapp.com",
projectId:"rifa-d7efe"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

function vender(){
let n=document.getElementById('nombre').value;
let num=document.getElementById('numero').value.padStart(2,'0');
db.collection("rifa").doc("datos").set({[num]:n},{merge:true});
}

function borrar(){
let num=document.getElementById('numero').value.padStart(2,'0');
db.collection("rifa").doc("datos").update({[num]:firebase.firestore.FieldValue.delete()});
}

function verLista(){
db.collection("rifa").doc("datos").onSnapshot(doc=>{
let data=doc.data()||{};
let html="";
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
html+=num+" - "+(data[num]||"Vacante")+"<br>";
}
document.getElementById('lista').innerHTML=html;
});
}

function subirFondo(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(){
db.collection("rifa").doc("datos").set({fondo:reader.result},{merge:true});
}
reader.readAsDataURL(file);
}
</script>

</body>
</html>
