<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:Arial">

<h2>🔐 ADMIN</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="numero" placeholder="Numero 00-99"><br><br>

<button onclick="vender()">➕ Vender</button>
<button onclick="borrar()">➖ Liberar</button>

<br><br>

<h3>📋 Lista</h3>
<div id="lista"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, deleteField, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDIjZRr3gKoNtWzlP9zWtiRBaRKgWwQ770",
authDomain:"elyrifa-5e8ce.firebaseapp.com",
projectId:"elyrifa-5e8ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* VENDER */
window.vender = async function(){
let nombre=document.getElementById('nombre').value;
let numero=document.getElementById('numero').value.padStart(2,'0');

await setDoc(doc(db,"rifa","datos"),{
[numero]:nombre
},{merge:true});
}

/* BORRAR */
window.borrar = async function(){
let numero=document.getElementById('numero').value.padStart(2,'0');

await updateDoc(doc(db,"rifa","datos"),{
[numero]:deleteField()
});
}

/* LISTA EN VIVO */
onSnapshot(doc(db,"rifa","datos"),(docu)=>{
let data=docu.data()||{};
let html="";

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
html+=num+" - "+(data[num]||"Disponible")+"<br>";
}

document.getElementById('lista').innerHTML=html;
});
</script>

</body>
</html>
