<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:Arial">

<div id="login">
<h2>🔒 LOGIN</h2>
<input id="pass" placeholder="Contraseña"><br><br>
<button onclick="login()">Entrar</button>
</div>

<div id="panel" style="display:none">

<h2>🔐 ADMIN</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="numero" placeholder="Numero 00-99"><br><br>

<button onclick="vender()">➕ Vender</button>
<button onclick="borrar()">➖ Liberar</button>

<br><br>

<input id="fondo" placeholder="URL fondo"><br><br>
<button onclick="guardarFondo()">🖼️ Fondo</button>

<br><br>

<button onclick="verLista()">📋 Ver lista</button>
<button onclick="finalizar()">🏁 Finalizar</button>

<div id="lista" style="display:none"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, deleteField, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyB2bsxvhoYZWGmDSIYQoQ7v7cC8QXYRFTc",
authDomain:"rifa-d7efe.firebaseapp.com",
projectId:"rifa-d7efe"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
window.login = function(){
if(document.getElementById('pass').value==="1234"){
document.getElementById('login').style.display="none";
document.getElementById('panel').style.display="block";
}else{
alert("Incorrecto");
}
}

/* VENDER */
window.vender = async function(){
let n=document.getElementById('nombre').value;
let num=document.getElementById('numero').value.padStart(2,'0');

await setDoc(doc(db,"rifa","datos"),{[num]:n},{merge:true});
}

/* BORRAR */
window.borrar = async function(){
let num=document.getElementById('numero').value.padStart(2,'0');

await updateDoc(doc(db,"rifa","datos"),{
[num]:deleteField()
});
}

/* FONDO */
window.guardarFondo = async function(){
let url=document.getElementById('fondo').value;

await setDoc(doc(db,"rifa","datos"),{
fondo:url
},{merge:true});
}

/* VER LISTA TOGGLE */
let visible=false;
window.verLista = function(){

visible=!visible;
document.getElementById('lista').style.display=visible?"block":"none";

if(!visible)return;

onSnapshot(doc(db,"rifa","datos"),(docu)=>{
let data=docu.data()||{};
let html="";

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
html+=num+" - "+(data[num]||"Disponible")+"<br>";
}

document.getElementById('lista').innerHTML=html;
});
}

/* FINALIZAR + EXCEL */
window.finalizar = async function(){

let docu = await getDoc(doc(db,"rifa","datos"));
let data = docu.data()||{};

let csv="Numero,Nombre\n";

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
if(data[num]){
csv+=num+","+data[num]+"\n";
}
}

/* DESCARGA */
let blob = new Blob([csv], { type: 'text/csv' });
let a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "ventas.csv";
a.click();

/* RESET */
await setDoc(doc(db,"rifa","datos"),{}, {merge:false});

alert("Rifa finalizada y reiniciada");
}
</script>

</body>
</html>
