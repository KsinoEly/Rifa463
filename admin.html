<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:Arial">

<div id="login">
<h2>🔒 Acceso Admin</h2>
<input id="user" placeholder="Usuario"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>
<button onclick="login()">Ingresar</button>
</div>

<div id="panel" style="display:none;">

<h2>🔐 ADMIN</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="numero" placeholder="Numero 00-99"><br><br>

<button onclick="vender()">➕ Vender</button>
<button onclick="borrar()">➖ Liberar</button>
<button onclick="finalizar()">🏁 Finalizar</button>

<br><br>

<!-- NUEVO -->
<h3>🖼️ Fondo</h3>
<input type="file" id="fondoInput"><br><br>
<button onclick="subirFondo()">Cambiar Fondo</button>

<br><br>

<div id="lista"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, deleteField, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDIjZRr3gKoNtWzlP9zWtiRBaRKgWwQ770",
authDomain:"elyrifa-5e8ce.firebaseapp.com",
projectId:"elyrifa-5e8ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuarioActual = "";

/* LOGIN */
window.login = function(){
let u = user.value;
let p = pass.value;

if((u==="admin1" && p==="1991$") || (u==="admin2" && p==="463$")){
usuarioActual = u;
login.style.display="none";
panel.style.display="block";
}else{
alert("Datos incorrectos");
}
}

/* VENDER */
window.vender = async function(){
let n=nombre.value;
let num=numero.value.padStart(2,'0');

await setDoc(doc(db,"rifa","datos"),{
[num]: {nombre:n, vendedor:usuarioActual}
},{merge:true});
}

/* BORRAR */
window.borrar = async function(){
let num=numero.value.padStart(2,'0');
await updateDoc(doc(db,"rifa","datos"),{[num]:deleteField()});
}

/* FINALIZAR */
window.finalizar = async function(){
let docu = await getDoc(doc(db,"rifa","datos"));
let data = docu.data() || {};

let csv="Numero,Nombre,Vendedor\n";

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
if(data[num]){
csv+=num+","+data[num].nombre+","+data[num].vendedor+"\n";
}
}

let blob=new Blob([csv],{type:'text/csv'});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ventas.csv";
a.click();

await setDoc(doc(db,"rifa","datos"),{}, {merge:false});

alert("Rifa reiniciada");
}

/* FONDO */
window.subirFondo = function(){
let file = fondoInput.files[0];

let reader = new FileReader();
reader.onload = async function(e){
await setDoc(doc(db,"rifa","config"),{
fondo:e.target.result
});
alert("Fondo actualizado");
}
reader.readAsDataURL(file);
}

/* LISTA */
onSnapshot(doc(db,"rifa","datos"),(docu)=>{
let data=docu.data()||{};
let html="";

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');

if(data[num]){
html+=num+" - "+data[num].nombre+" ("+data[num].vendedor+")<br>";
}else{
html+=num+" - Disponible<br>";
}
}

lista.innerHTML=html;
});
</script>

</body>
</html>
