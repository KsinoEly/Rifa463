<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;font-family:Arial">

<script>
let user = prompt("Usuario:");
let pass = prompt("Contraseña:");

if(user !== "K-sinoEly1" || pass !== "Pomelo1991$"){
  alert("Acceso denegado");
  window.location.href = "index.html";
}
</script>

<h2>ADMIN</h2>

<input id="nombre" placeholder="Nombre"><br>
<input id="numero" placeholder="Numero 00-99"><br>

<button onclick="sumar()" style="background:green;color:white">➕ Vender</button>
<button onclick="restar()" style="background:red;color:white">➖ Liberar</button>

<h3>Lista</h3>
<div id="lista"></div>

<button onclick="fondo()">Cambiar fondo</button>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB2bsxvhoYZWGmDSIYQoQ7v7cC8QXYRFTc",
  authDomain: "rifa-d7efe.firebaseapp.com",
  projectId: "rifa-d7efe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const lista=document.getElementById('lista');

function actualizar(){
db.collection("rifa").doc("datos").get().then(doc=>{
let data=doc.data()||{};
let html='';
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
html+=num+' - '+(data[num]||'Vacante')+'<br>';
}
lista.innerHTML=html;
});
}

function sumar(){
let nombre=document.getElementById('nombre').value;
let numero=document.getElementById('numero').value.padStart(2,'0');
db.collection("rifa").doc("datos").set({[numero]:nombre},{merge:true});
actualizar();
}

function restar(){
let numero=document.getElementById('numero').value.padStart(2,'0');
db.collection("rifa").doc("datos").update({[numero]:firebase.firestore.FieldValue.delete()});
actualizar();
}

function fondo(){
let url=prompt('URL imagen');
db.collection("rifa").doc("datos").set({fondo:url},{merge:true});
}

setInterval(actualizar,2000);
</script>

</body>
</html>
