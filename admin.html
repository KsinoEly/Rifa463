<!DOCTYPE html>
<html>
<body style="margin:0;font-family:Arial;background:black;color:white;text-align:center;">

<div id="login">
<h2 style="color:gold;">🔒 Ksino Ely Admin</h2>
<input id="pass" type="password" placeholder="Contraseña"><br><br>
<button onclick="login()">Ingresar</button>
</div>

<div id="panel" style="display:none;">

<h2 style="color:gold;">🎰 PANEL ADMIN 🎰</h2>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="numero" placeholder="Numero 00-99"><br><br>

<button onclick="vender()">➕ Vender</button>
<button onclick="borrar()">➖ Liberar</button>
<button onclick="finalizar()">🏁 Finalizar</button>

<br><br>

<div id="lista" style="max-width:300px;margin:auto;text-align:left;"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, updateDoc, deleteField, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDIjZRr3gKoNtWzlP9zWtiRBaRKgWwQ770",
authDomain:"elyrifa-5e8ce.firebaseapp.com",
projectId:"elyrifa-5e8ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOGIN */
window.login = function(){
if(document.getElementById("pass").value==="1991$"){
login.style.display="none";
panel.style.display="block";
}else{
alert("Contraseña incorrecta");
}
}

/* VENDER */
window.vender = async function(){
let n=nombre.value;
let num=numero.value.padStart(2,'0');
await setDoc(doc(db,"rifa","datos"),{[num]:n},{merge:true});
}

/* BORRAR */
window.borrar = async function(){
let num=numero.value.padStart(2,'0');
await updateDoc(doc(db,"rifa","datos"),{[num]:deleteField()});
}

/* FINALIZAR */
window.finalizar = async function(){
let docu = await getDoc(doc(db,"rifa","datos"));
let data = docu.data() || {};

let csv="Numero,Nombre\n";

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
if(data[num]) csv+=num+","+data[num]+"\n";
}

let blob=new Blob([csv],{type:'text/csv'});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="ventas.csv";
a.click();

await setDoc(doc(db,"rifa","datos"),{}, {merge:false});

alert("Rifa reiniciada");
}

/* LISTA */
onSnapshot(doc(db,"rifa","datos"),(docu)=>{
let data=docu.data()||{};
let html="";
for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
html+=num+" - "+(data[num]||"Disponible")+"<br>";
}
lista.innerHTML=html;
});
</script>

</body>
</html>
