<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>K-sinoEly</title>

<style>
body{
margin:0;
font-family:Arial;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

h1{
color:gold;
text-shadow:0 0 15px gold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:30px;
padding:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
width:95vw;
max-width:520px;
}

.cell{
aspect-ratio:1;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
border-radius:10px;
background:linear-gradient(145deg,#1fa34a,#0b5f2b);
font-size:18px;
box-shadow:0 0 10px #0f0;
transition:0.2s;
cursor:pointer;
}

.cell:hover{
transform:scale(1.1);
box-shadow:0 0 15px gold;
}

.sold{
background:linear-gradient(145deg,#7a1c1c,#3b0000);
box-shadow:0 0 10px red;
cursor:default;
}

.side{
background:rgba(0,0,0,0.6);
padding:15px;
border-radius:10px;
box-shadow:0 0 10px gold;
}

.star{
box-shadow:0 0 15px gold !important;
}

#wsp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
padding:15px;
border-radius:50%;
text-decoration:none;
box-shadow:0 0 15px black;
z-index:999;
}

.coin{
position:fixed;
top:-50px;
color:gold;
opacity:0.4;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<h1>🎰 K-SINO ELY 🎰</h1>

<h2>POZO</h2>
<h2 id="pozo">$50.000</h2>

<div class="container">

<div class="grid" id="grid"></div>

<div class="side">
<h3>Vendidos: <span id="count">0</span></h3>

<p>
0 a 49 → $50.000<br>
50 a 99 → $150.000<br>
100 → $250.000
</p>
</div>

</div>

<a id="wsp" target="_blank">💬</a>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const firebaseConfig={
apiKey:"AIzaSyB2bsxvhoYZWGmDSIYQoQ7v7cC8QXYRFTc",
authDomain:"rifa-d7efe.firebaseapp.com",
projectId:"rifa-d7efe"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const grid=document.getElementById('grid');
const count=document.getElementById('count');
const pozo=document.getElementById('pozo');

db.collection("rifa").doc("datos").onSnapshot(doc=>{
let data=doc.data()||{};
grid.innerHTML="";
let vendidos=0;

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let div=document.createElement('div');
div.className="cell";

if(data[num]){
div.classList.add("sold");
div.textContent="X";
vendidos++;
}else{
div.textContent=num;

div.onclick=()=>{
if(data.whatsapp){
let msg="Hola quiero el número "+num+" de la rifa";
let url="https://wa.me/"+data.whatsapp+"?text="+encodeURIComponent(msg);
window.open(url,"_blank");
}
}
}

grid.appendChild(div);
}

count.textContent=vendidos;

let p=50000;
if(vendidos>=100)p=250000;
else if(vendidos>=50)p=150000;

pozo.textContent="$"+p.toLocaleString();

if(data.fondo){
document.body.style.backgroundImage=url(${data.fondo});
document.body.style.backgroundSize="cover";
}

let wsp=document.getElementById('wsp');
if(data.whatsapp){
wsp.href="https://wa.me/"+data.whatsapp;
}
});

setInterval(()=>{
let c=document.querySelectorAll('.cell');
c.forEach(x=>x.classList.remove('star'));
c[Math.floor(Math.random()*c.length)].classList.add('star');
},2000);

setInterval(()=>{
let c=document.createElement('div');
c.className='coin';
c.textContent=Math.random()>0.5?"💰":"💎";
c.style.left=Math.random()*100+'vw';
c.style.animationDuration=(Math.random()*3+2)+'s';
document.body.appendChild(c);
setTimeout(()=>c.remove(),5000);
},400);
</script>

</body>
</html>
