<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa 463</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:url("FONDO.jpg") no-repeat center center fixed;
background-size:cover;
backdrop-filter: blur(6px);
}

.overlay{
background:rgba(0,0,0,0.75);
min-height:100vh;
padding:20px;
}

h1{
color:gold;
margin:5px;
}

.brand{
font-size:22px;
color:gold;
margin-bottom:10px;
}

.container{
display:flex;
justify-content:center;
align-items:flex-start;
gap:30px;
flex-wrap:wrap;
}

/* IZQUIERDA */
.info{
max-width:250px;
text-align:left;
font-size:14px;
}

/* DERECHA */
.stats{
max-width:200px;
text-align:center;
}

/* POZO */
.pozo-box{
border:2px solid gold;
padding:10px;
border-radius:10px;
margin-bottom:10px;
}

/* GRILLA */
.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:6px;
max-width:400px;
}

.cell{
aspect-ratio:1;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
background:#1f7a4d;
font-weight:bold;
}

.sold{
background:#c62828;
}
</style>
</head>

<body>

<div class="overlay">

<h1>💎 463 💎</h1>
<div class="brand">✨ Ksino Ely ✨</div>

<div class="container">

<!-- IZQUIERDA -->
<div class="info">
<b>Valor del Pozo:</b><br><br>
0 a 49 vendidos → $50.000<br>
50 a 99 vendidos → $150.000<br>
100 vendidos → $250.000
</div>

<!-- GRILLA -->
<div class="grid" id="grid"></div>

<!-- DERECHA -->
<div class="stats">
<div class="pozo-box">
💰 Pozo<br>
<span id="pozo">$50.000</span>
</div>

<p>Vendidos: <span id="count">0</span></p>
</div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDIjZRr3gKoNtWzlP9zWtiRBaRKgWwQ770",
authDomain:"elyrifa-5e8ce.firebaseapp.com",
projectId:"elyrifa-5e8ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");
const count = document.getElementById("count");
const pozo = document.getElementById("pozo");

function dibujar(data={}){
grid.innerHTML="";
let vendidos=0;

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');

let div=document.createElement("div");
div.className="cell";

if(data[num]){
div.classList.add("sold");
div.innerText="❌";
vendidos++;
}else{
div.innerText=num;
}

grid.appendChild(div);
}

count.textContent=vendidos;

let p=50000;
if(vendidos==100)p=250000;
else if(vendidos>=50)p=150000;

pozo.textContent="$"+p.toLocaleString();
}

dibujar();

onSnapshot(doc(db,"rifa","datos"),(docu)=>{
dibujar(docu.data()||{});
});
</script>

</body>
</html>
