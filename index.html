<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ksino Ely</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
transition:0.5s;
}

/* TITULO */
.brand{
color:gold;
font-size:30px;
font-weight:bold;
margin-top:15px;
}

/* SUBTITULO */
.sub{
color:gold;
font-size:22px;
margin-bottom:15px;
}

/* CONTENEDOR */
.center{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

/* POZO DESTACADO */
.pozo-box{
border:2px solid gold;
padding:15px;
border-radius:12px;
font-size:22px;
box-shadow:0 0 10px rgba(255,215,0,0.4);
}

/* VENDIDOS */
.stats{
font-size:18px;
}

/* GRILLA */
.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
width:95vw;
max-width:520px;
}

.cell{
aspect-ratio:1;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:#1f7a4d;
font-weight:bold;
font-size:16px;
}

.sold{
background:#d50000;
}

/* VALOR POZO (SOLO BORDE) */
.info{
border:2px solid white;
padding:15px;
border-radius:10px;
font-size:15px;
max-width:320px;
margin-top:10px;
}

/* BOTON AUDIO */
.audio-btn{
position:fixed;
bottom:10px;
right:10px;
background:gold;
border:none;
padding:10px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="brand">✨ Ksino Ely ✨</div>
<div class="sub">💎 463 💎</div>

<div class="center">

<!-- POZO -->
<div class="pozo-box">
💰 Pozo<br>
<span id="pozo">$50.000</span>
</div>

<!-- VENDIDOS -->
<div class="stats">
Vendidos: <span id="count">0</span>
</div>

<!-- GRILLA -->
<div class="grid" id="grid"></div>

<!-- VALOR POZO ABAJO -->
<div class="info">
<b>Valor del Pozo:</b><br><br>
0 a 49 vendidos → $50.000<br>
50 a 99 vendidos → $150.000<br>
100 vendidos → $250.000
</div>

</div>

<!-- AUDIO -->
<audio id="musica" loop>
  <source src="musica.ogg" type="audio/ogg">
</audio>

<audio id="ventaSound">
  <source src="win.ogg" type="audio/ogg">
</audio>

<button class="audio-btn" onclick="activarAudio()">🔊 Música</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDIjZRr3gKoNtWzlP9zWtiRBaRKgWwQ770",
authDomain:"elyrifa-5e8ce.firebaseapp.com",
projectId:"elyrifa-5e8ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");
const count = document.getElementById("count");
const pozo = document.getElementById("pozo");

let ultimoVendidos = 0;

/* AUDIO */
window.activarAudio = function(){
let audio = document.getElementById("musica");
audio.volume = 0.25;
audio.play();
}

/* DIBUJAR */
function dibujar(data={}){
grid.innerHTML="";
let vendidos=0;

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');

let div=document.createElement("div");
div.className="cell";

if(data[num]){
div.classList.add("sold");
div.innerText="❌";
vendidos++;
}else{
div.innerText=num;
}

grid.appendChild(div);
}

/* SONIDO */
if(vendidos > ultimoVendidos){
let s = document.getElementById("ventaSound");
s.volume = 0.5;
s.play();
}
ultimoVendidos = vendidos;

count.textContent=vendidos;

/* POZO */
let p=50000;
if(vendidos==100)p=250000;
else if(vendidos>=50)p=150000;

pozo.textContent="$"+p.toLocaleString();
}

/* INICIAL */
dibujar();

/* TIEMPO REAL */
onSnapshot(doc(db,"rifa","datos"),(docu)=>{
dibujar(docu.data()||{});
});

/* FONDO */
onSnapshot(doc(db,"rifa","config"),(docu)=>{
let data = docu.data();
if(data && data.fondo){
document.body.style.background = `url(${data.fondo}) center/cover fixed`;
}
});
</script>

</body>
</html>
