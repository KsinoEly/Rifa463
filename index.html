<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa 463</title>

<style>
body{margin:0;background:black;color:white;text-align:center;font-family:Arial}
h1{color:gold;margin:10px}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
width:95vw;
max-width:520px;
margin:auto;
}

.cell{
aspect-ratio:1;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:#00c853;
font-weight:bold;
box-shadow:0 0 10px #00ff88;
}

.sold{background:#d50000}
</style>
</head>

<body>

<h1>🎰 RIFA 463 🎰</h1>

<h2>💰 POZO</h2>
<h2 id="pozo">$50.000</h2>

<div>
🟢 00 a 49 → $50.000<br>
🟡 50 a 95 → $150.000<br>
🔴 95 a 99 → $250.000
</div>

<p>Vendidos: <span id="count">0</span></p>

<div class="grid" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const grid=document.getElementById('grid');
const count=document.getElementById('count');
const pozo=document.getElementById('pozo');

/* 🧠 FUNCION QUE SIEMPRE DIBUJA */
function dibujar(data={}){

grid.innerHTML="";
let vendidos=0;

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let div=document.createElement('div');
div.className="cell";

if(data[num]){
div.classList.add("sold");
div.innerText="❌";
vendidos++;
}else{
div.innerText=num;
}

grid.appendChild(div);
}

/* CONTADOR */
count.textContent=vendidos;

/* POZO */
let p=50000;
if(vendidos>=95)p=250000;
else if(vendidos>=50)p=150000;

pozo.textContent="$"+p.toLocaleString();
}

/* 👇 DIBUJA AUNQUE FIREBASE FALLE */
dibujar();

/* 🔥 FIREBASE */
try{

const firebaseConfig={
apiKey:"AIzaSyB2bsxvhoYZWGmDSIYQoQ7v7cC8QXYRFTc",
authDomain:"rifa-d7efe.firebaseapp.com",
projectId:"rifa-d7efe"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* TIEMPO REAL */
db.collection("rifa").doc("datos").onSnapshot(doc=>{
dibujar(doc.data()||{});
});

}catch(e){
console.log("Firebase no cargó, pero la grilla funciona igual");
}
</script>

</body>
</html>
