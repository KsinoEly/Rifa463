<script>
const firebaseConfig={
apiKey:"AIzaSyB2bsxvhoYZWGmDSIYQoQ7v7cC8QXYRFTc",
authDomain:"rifa-d7efe.firebaseapp.com",
projectId:"rifa-d7efe"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

const grid=document.getElementById('grid');
const count=document.getElementById('count');
const pozo=document.getElementById('pozo');

db.collection("rifa").doc("datos").onSnapshot(doc=>{
let data=doc.data()||{};
grid.innerHTML="";
let vendidos=0;

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let div=document.createElement('div');
div.className="cell";

/* SI ESTA VENDIDO */
if(data[num]){
div.classList.add("sold");
div.innerHTML = <span class="num">${num}</span><span class="x">✖</span>;
vendidos++;
}

/* SI ESTA DISPONIBLE */
else{
div.innerHTML = <span class="num">${num}</span>;

/* CLICK WHATSAPP */
div.onclick=()=>{
if(data.whatsapp){
let msg="Hola quiero el número "+num+" de la rifa";
let url="https://wa.me/"+data.whatsapp+"?text="+encodeURIComponent(msg);
window.open(url,"_blank");
}
}
}

grid.appendChild(div);
}

count.textContent=vendidos;

/* POZO */
let p=50000;
if(vendidos>=100)p=250000;
else if(vendidos>=50)p=150000;

pozo.textContent="$"+p.toLocaleString();

/* FONDO */
if(data.fondo){
document.body.style.backgroundImage=url(${data.fondo});
document.body.style.backgroundSize="cover";
}

/* BOTON WHATSAPP */
let wsp=document.getElementById('wsp');
if(data.whatsapp){
wsp.href="https://wa.me/"+data.whatsapp;
}
});

/* DESTELLOS */
setInterval(()=>{
let c=document.querySelectorAll('.cell:not(.sold)');
if(c.length===0)return;

let r=c[Math.floor(Math.random()*c.length)];
r.classList.add('star');

setTimeout(()=>r.classList.remove('star'),800);
},1200);

/* MONEDAS */
setInterval(()=>{
let c=document.createElement('div');
c.className='coin';
c.textContent=Math.random()>0.5?"💰":"💎";
c.style.left=Math.random()*100+'vw';
c.style.animationDuration=(Math.random()*3+2)+'s';
document.body.appendChild(c);
setTimeout(()=>c.remove(),5000);
},400);
</script>
