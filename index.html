<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Rifa 463</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
}

h1{color:gold}

.grid{
display:grid;
grid-template-columns:repeat(10,1fr);
gap:8px;
width:95vw;
max-width:520px;
margin:auto;
}

.cell{
aspect-ratio:1;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
background:#00a844;
font-weight:bold;
}

.sold{
background:#d50000;
}
</style>
</head>

<body>

<h1>🎰 RIFA 463 🎰</h1>

<p>Vendidos: <span id="count">0</span></p>

<h3>💰 Pozo: <span id="pozo">$50.000</span></h3>

<p>
Valor de Pozo según cantidad de números vendidos:<br><br>
0 a 49 vendidos → $50.000<br>
50 a 99 vendidos → $150.000<br>
100 vendidos → $250.000
</p>

<div class="grid" id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyDIjZRr3gKoNtWzlP9zWtiRBaRKgWwQ770",
authDomain:"elyrifa-5e8ce.firebaseapp.com",
projectId:"elyrifa-5e8ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const grid = document.getElementById("grid");
const count = document.getElementById("count");
const pozo = document.getElementById("pozo");

function dibujar(data={}){
grid.innerHTML="";
let vendidos=0;

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');

let div=document.createElement("div");
div.className="cell";

if(data[num]){
div.classList.add("sold");
div.innerText="❌";
vendidos++;
}else{
div.innerText=num;
}

grid.appendChild(div);
}

count.textContent=vendidos;

/* POZO */
let p=50000;
if(vendidos==100)p=250000;
else if(vendidos>=50)p=150000;

pozo.textContent="$"+p.toLocaleString();
}

/* INICIAL */
dibujar();

/* TIEMPO REAL */
onSnapshot(doc(db,"rifa","datos"),(docu)=>{
dibujar(docu.data()||{});
});
</script>

</body>
</html>
