<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>K-sinoEly</title>
<style>
body{margin:0;font-family:Arial;color:white;text-align:center;background:black;overflow:hidden}
.container{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;position:relative;z-index:2}
.grid{display:grid;grid-template-columns:repeat(10,1fr);gap:5px;width:90vw;max-width:500px}
.cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:6px;background:#1f8f3a;animation:glow 2s infinite alternate}
.sold{background:#7a1c1c}
@keyframes glow{from{transform:scale(1)}to{transform:scale(1.1)}}
.coin{position:fixed;top:-50px;font-size:20px;color:gold;animation:fall linear infinite;z-index:1}
@keyframes fall{to{transform:translateY(110vh)}}
.side{max-width:200px}
</style>
</head>
<body>

<h1>Bienvenidos a la Rifa</h1>
<h2>POZO</h2>
<h2 id="pozo">$50.000</h2>

<div class="container">
<div>
<h2>K-sinoEly</h2>
<div class="grid" id="grid"></div>
</div>

<div class="side">
<h3>Vendidos: <span id="count">0</span></h3>
<p>0-49 → $50.000<br>50-99 → $150.000<br>100 → $250.000</p>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB2bsxvhoYZWGmDSIYQoQ7v7cC8QXYRFTc",
  authDomain: "rifa-d7efe.firebaseapp.com",
  projectId: "rifa-d7efe"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const grid=document.getElementById('grid');
const count=document.getElementById('count');
const pozoEl=document.getElementById('pozo');

db.collection("rifa").doc("datos").onSnapshot(doc=>{
let data=doc.data()||{};
grid.innerHTML='';
let vendidos=0;

for(let i=0;i<100;i++){
let num=i.toString().padStart(2,'0');
let div=document.createElement('div');
div.className='cell';

if(data[num]){
div.classList.add('sold');
div.textContent='X';
vendidos++;
}else{
div.textContent=num;
}
grid.appendChild(div);
}

count.textContent=vendidos;

let pozo=50000;
if(vendidos>=100) pozo=250000;
else if(vendidos>=50) pozo=150000;

pozoEl.textContent='$'+pozo.toLocaleString();

if(data.fondo){
document.body.style.backgroundImage=`url(${data.fondo})`;
document.body.style.backgroundSize='cover';
}
});

function crearMoneda(){
let coin=document.createElement('div');
coin.className='coin';
coin.textContent='463';
coin.style.left=Math.random()*100+'vw';
coin.style.animationDuration=(Math.random()*3+2)+'s';
document.body.appendChild(coin);
setTimeout(()=>coin.remove(),5000);
}
setInterval(crearMoneda,300);
</script>

</body>
</html>
